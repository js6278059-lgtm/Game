<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crossy Road Deluxe (Fixed)</title>
<style>
body{margin:0;background:#222;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
#hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:20px;font-weight:bold}
canvas{border:4px solid white;background:#87ceeb}
</style>
</head>
<body>
<div id="hud">Score: <span id="score">0</span> | Coins: <span id="coins">0</span> | Lives: <span id="lives">3</span></div>
<canvas id="game" width="720" height="900"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const scoreEl = document.getElementById('score');
const coinsEl = document.getElementById('coins');
const livesEl = document.getElementById('lives');

let score = 0;
let coins = 0;
let lives = 3;

const player = {x:340,y:820,w:40,h:50};

const cars=[];
for(let lane=0; lane<4; lane++){
  for(let i=0;i<4;i++){
    cars.push({
      x:i*220+Math.random()*150,
      y:170+lane*70,
      w:60+Math.random()*40,
      h:40,
      speed:2+Math.random()*4,
      color:`hsl(${Math.random()*360},80%,55%)`
    });
  }
}

function resetPlayer(){
  player.x=340;
  player.y=820;
}

function collide(a,b){
 return a.x < b.x+b.w &&
        a.x+a.w > b.x &&
        a.y < b.y+b.h &&
        a.y+a.h > b.y;
}

window.addEventListener('keydown',e=>{
 if(e.key==='ArrowUp') player.y-=50;
 if(e.key==='ArrowDown') player.y+=50;
 if(e.key==='ArrowLeft') player.x-=50;
 if(e.key==='ArrowRight') player.x+=50;

 player.x=Math.max(0,Math.min(canvas.width-player.w,player.x));
 player.y=Math.max(0,Math.min(canvas.height-player.h,player.y));
});

function update(){
 cars.forEach(car=>{
   car.x-=car.speed;

   if(car.x+car.w<0){
      car.x=canvas.width+Math.random()*200;
   }

   if(collide(player,car)){
      lives--;
      livesEl.textContent=lives;
      resetPlayer();

      if(lives<=0){
        alert('Game Over! Score: '+score);
        score=0;
        coins=0;
        lives=3;
        scoreEl.textContent=0;
        coinsEl.textContent=0;
        livesEl.textContent=3;
      }
   }
 });

 if(player.y < 100){
   score++;
   scoreEl.textContent=score;
   resetPlayer();
 }
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 ctx.fillStyle='#44aa44';
 ctx.fillRect(0,0,canvas.width,100);

 ctx.fillStyle='#555';
 ctx.fillRect(0,100,canvas.width,700);

 ctx.fillStyle='#44aa44';
 ctx.fillRect(0,800,canvas.width,100);

 cars.forEach(car=>{
   ctx.fillStyle=car.color;
   ctx.fillRect(car.x,car.y,car.w,car.h);
 });

 ctx.fillStyle='deepskyblue';
 ctx.fillRect(player.x,player.y,player.w,player.h);
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
